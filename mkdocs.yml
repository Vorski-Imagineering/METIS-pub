site_name: METIS-pub Docs
site_url: https://docs.the-gathering.earth/
repo_url: https://github.com/Vorski-Imagineering/METIS-pub
repo_name: Vorski-Imagineering/METIS-pub
docs_dir: site_src

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Modules:
      - LinkedIn Automation: automation/linkedin-automation/README.md
      - METIS API: automation/metis/README.md
      - Google Sheets: automation/google-sheets/README.md
  - API Reference:
      - Overview: docs-pub/api/API.md
      - Playbook: docs-pub/api/PLAYBOOK.md
      - Coherence Playbook: docs-pub/api/coherence/PLAYBOOK.md
      - Conversation JSON Fields: docs-pub/api/coherence/CONVERSATION_JSON_FIELDS.md
  - Agents: docs-pub/agents/README.md
  - Core: docs-pub/core/README.md
  - Metis Apps: docs-pub/metis_apps/README.md
  - Contributing: CONTRIBUTING.md

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
