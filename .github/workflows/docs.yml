name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - name: Assemble doc sources
        run: |
          set -e
          rm -rf site_src
          mkdir -p site_src/automation/linkedin-automation site_src/automation/metis site_src/automation/google-sheets
          cp README.md site_src/index.md
          cp CONTRIBUTING.md site_src/CONTRIBUTING.md
          cp automation/README.md site_src/automation/README.md
          cp automation/linkedin-automation/README.md site_src/automation/linkedin-automation/README.md
          cp automation/metis/README.md site_src/automation/metis/README.md
          cp automation/google-sheets/README.md site_src/automation/google-sheets/README.md
          # Whole-folder copy: new files dropped into docs-pub/ publish automatically,
          # no workflow edit needed. Just add a nav entry in mkdocs.yml.
          cp -r docs-pub site_src/docs-pub

      - name: Normalize synced Markdown for Python-Markdown compatibility
        run: python3 .github/scripts/normalize_markdown_lists.py site_src/docs-pub

      - run: mkdocs build --strict

      - name: Set custom domain
        run: echo "docs.the-gathering.earth" > site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
